name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Clean previous builds
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build APK (debug)
        run: |
          flutter build apk --debug --verbose 2>&1 | tee build_debug.log

      - name: Build APK (release)
        run: |
          flutter build apk --release --verbose 2>&1 | tee build_release.log

      - name: List build output
        if: always()
        run: |
          echo "=== Find all APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== Default APK path ==="
          ls -laR build/app/outputs/flutter-apk/ 2>/dev/null || echo "Default path not found"
          echo "=== Build directory tree ==="
          find build/ -type f -name "*.apk" -o -name "*.aab" 2>/dev/null | head -20
          echo "=== Android build output ==="
          find android/ -name "*.apk" 2>/dev/null || echo "No APK in android dir"
          echo "=== Full build tree ==="
          ls -laR build/app/outputs/ 2>/dev/null || echo "No outputs dir"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build_debug.log
            build_release.log
          retention-days: 7

      - name: Check APK file
        if: always()
        run: |
          APK=$(find build/ -name "app-release.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ] && [ -f "$APK" ]; then
            echo "APK found: $APK"
            echo "Size: $(du -h "$APK" | cut -f1)"
            # Copy to expected location
            mkdir -p build/app/outputs/flutter-apk/
            cp "$APK" build/app/outputs/flutter-apk/app-release.apk
          else
            echo "No release APK found!"
            echo "Searching for any APK files..."
            find build/ -name "*.apk" 2>/dev/null || echo "No APK files at all"
            exit 1
          fi

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Novel Writer v1.0.${{ github.run_number }}

            自动构建于 ${{ github.event.head_commit.timestamp }}

            提交信息: ${{ github.event.head_commit.message }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}