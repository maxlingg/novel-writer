name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Build with fresh Flutter project
        run: |
          set -o pipefail
          
          echo "=== Step 1: Create fresh Flutter project ==="
          cd /tmp
          flutter create --org com.novelwriter --project-name novel_writer fresh_app
          cd fresh_app
          
          echo "=== Step 2: Copy our code into fresh project ==="
          # Remove default lib
          rm -rf lib
          # Copy our lib and pubspec
          cp -r $GITHUB_WORKSPACE/lib .
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          # Copy assets if any
          if [ -d "$GITHUB_WORKSPACE/assets" ]; then
            cp -r $GITHUB_WORKSPACE/assets .
          fi
          
          echo "=== Step 3: Get dependencies ==="
          flutter pub get 2>&1
          
          echo "=== Step 4: Build APK ==="
          flutter build apk --release 2>&1 | tee build.log
          EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== BUILD FAILED - tail of log ==="
            tail -200 build.log
            echo "=== Gradle daemon log ==="
            cat ~/.gradle/daemon/*/daemon-*.log 2>/dev/null | tail -50 || true
            exit $EXIT_CODE
          fi
          
          echo "=== BUILD SUCCEEDED ==="
          find . -name "*.apk" 2>/dev/null
          
          # Copy APK back to workspace
          APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            mkdir -p $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/
            cp "$APK" $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/app-release.apk
            echo "APK copied to workspace"
          fi

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Novel Writer v1.0.${{ github.run_number }}

            自动构建于 ${{ github.event.head_commit.timestamp }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}