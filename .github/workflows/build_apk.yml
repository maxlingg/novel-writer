name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Clean previous builds
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build APK
        run: |
          set -o pipefail
          flutter build apk --release --verbose 2>&1 | tee build.log

      - name: Show build log tail
        if: always()
        run: tail -100 build.log || echo "No build log"

      - name: Check APK file
        run: |
          echo "=== Listing build output ==="
          find build/ -name "*.apk" 2>/dev/null || echo "No APK files found"
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "Default path not found"
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "APK found successfully!"
            echo "Size: $(du -h build/app/outputs/flutter-apk/app-release.apk)"
          else
            echo "APK not found at default path!"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Novel Writer v1.0.${{ github.run_number }}

            自动构建于 ${{ github.event.head_commit.timestamp }}

            提交信息: ${{ github.event.head_commit.message }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
