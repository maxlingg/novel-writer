name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Clean previous builds
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: |
          flutter build apk --release 2>&1 | tee build_release.log
          echo "=== Build completed, checking output ==="
          echo "Exit code: $?"
          echo "=== APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== build/ directory ==="
          ls -laR build/ 2>/dev/null | head -80 || echo "No build dir"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build_release.log
          retention-days: 7

      - name: Upload APK
        if: always()
        run: |
          APK=$(find build/ -name "app-release.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "APK found: $APK"
            mkdir -p build/app/outputs/flutter-apk/
            cp "$APK" build/app/outputs/flutter-apk/app-release.apk
          else
            echo "APK not found, listing all APK files:"
            find . -name "*.apk" 2>/dev/null || echo "None"
            exit 1
          fi

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Novel Writer v1.0.${{ github.run_number }}

            自动构建于 ${{ github.event.head_commit.timestamp }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}