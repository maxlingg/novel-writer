name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Clean previous builds
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Check APK
        run: |
          echo "=== Searching for APK ==="
          APK=$(find . -name "app-release.apk" -o -name "*.apk" 2>/dev/null | head -5)
          if [ -z "$APK" ]; then
            echo "No APK found!"
            echo "=== Listing build directory ==="
            find build/ -type f 2>/dev/null | head -30
            echo "=== Listing android directory ==="
            find android/ -name "*.apk" 2>/dev/null
            exit 1
          fi
          echo "Found APK(s):"
          echo "$APK"
          # Copy to standard location
          mkdir -p build/app/outputs/flutter-apk/
          FIRST=$(echo "$APK" | head -1)
          cp "$FIRST" build/app/outputs/flutter-apk/app-release.apk
          echo "Copied to standard location"
          ls -la build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Novel Writer v1.0.${{ github.run_number }}

            自动构建于 ${{ github.event.head_commit.timestamp }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}