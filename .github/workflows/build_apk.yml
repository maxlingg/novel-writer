name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Build APK
        run: |
          set -o pipefail
          
          cd /tmp
          flutter create --org com.novelwriter --project-name novel_writer fresh_app
          cd fresh_app
          
          rm -rf lib
          cp -r $GITHUB_WORKSPACE/lib .
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          
          flutter pub get 2>&1
          
          echo "=== flutter analyze ===" >> $GITHUB_STEP_SUMMARY
          flutter analyze 2>&1 | tee /tmp/analyze.log
          ANALYZE_EXIT=${PIPESTATUS[0]}
          tail -30 /tmp/analyze.log >> $GITHUB_STEP_SUMMARY
          echo "analyze exit: $ANALYZE_EXIT" >> $GITHUB_STEP_SUMMARY
          
          echo "=== flutter build apk ===" >> $GITHUB_STEP_SUMMARY
          flutter build apk --release -v 2>&1 | tee /tmp/build.log
          EXIT_CODE=${PIPESTATUS[0]}
          
          echo "Build exit code: $EXIT_CODE" >> $GITHUB_STEP_SUMMARY
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== ERROR LINES ===" >> $GITHUB_STEP_SUMMARY
            grep -iE "error|fail|exception|BUILD FAILED" /tmp/build.log | tail -30 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 /tmp/build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $EXIT_CODE
          fi
          
          echo "=== BUILD SUCCEEDED ==="
          find . -name "*.apk" 2>/dev/null
          
          APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            mkdir -p $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/
            cp "$APK" $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/app-release.apk
          fi

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Novel Writer v1.0.${{ github.run_number }}

            自动构建于 ${{ github.event.head_commit.timestamp }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}