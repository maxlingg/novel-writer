name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Check Android SDK
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools"
          flutter config --list
          # Create local.properties if not exists
          if [ ! -f android/local.properties ]; then
            echo "Creating local.properties..."
            echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
            echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          fi
          cat android/local.properties 2>/dev/null || echo "No local.properties"

      - name: Clean previous builds
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        id: build
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee build.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "BUILD_EXIT_CODE=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Flutter build failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Build with Gradle directly
        if: always()
        run: |
          cd android
          echo "Running Gradle assembleRelease..."
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tee ../gradle_build.log
          cd ..
          echo "Gradle build done"

      - name: Find and Upload APK
        if: always()
        run: |
          echo "=== All APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "None"
          echo "=== build/ tree ==="
          find build/ -type f 2>/dev/null | head -50 || echo "No build dir"
          echo "=== android/app/build/ ==="
          find android/app/build/ -name "*.apk" 2>/dev/null || echo "No APK in android/app/build"
          echo "=== android/build/ ==="
          find android/build/ -name "*.apk" 2>/dev/null || echo "No APK in android/build"
          echo "=== gradle_build.log tail ==="
          tail -50 gradle_build.log 2>/dev/null || echo "No gradle_build.log"
          
          APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "APK: $APK"
          mkdir -p build/app/outputs/flutter-apk/
          cp "$APK" build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Novel Writer v1.0.${{ github.run_number }}

            自动构建于 ${{ github.event.head_commit.timestamp }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}